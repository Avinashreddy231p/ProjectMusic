<script>
        // Micro-interaction for filter chips
        const chips = document.querySelectorAll('section button');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                if(chip.parentElement.classList.contains('overflow-x-auto')){
                    const siblings = chip.parentElement.querySelectorAll('button');
                    siblings.forEach(s => {
                        s.classList.remove('bg-primary', 'text-on-primary', 'font-bold');
                        s.classList.add('bg-surface-container-highest', 'text-on-surface');
                    });
                    chip.classList.add('bg-primary', 'text-on-primary', 'font-bold');
                    chip.classList.remove('bg-surface-container-highest', 'text-on-surface');
                }
            });
        });
    </script>
