<script>
        // Subtle scroll behavior for the TopAppBar
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('shadow-sm');
                header.classList.remove('border-b-transparent');
            } else {
                header.classList.remove('shadow-sm');
            }
        });

        // Pill active state toggle
        const pills = document.querySelectorAll('button.whitespace-nowrap');
        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => {
                    p.classList.remove('bg-primary', 'text-on-primary', 'shadow-sm');
                    p.classList.add('bg-surface-container', 'text-on-surface-variant', 'border', 'border-outline-variant');
                });
                pill.classList.add('bg-primary', 'text-on-primary', 'shadow-sm');
                pill.classList.remove('bg-surface-container', 'text-on-surface-variant', 'border', 'border-outline-variant');
            });
        });
    </script>
