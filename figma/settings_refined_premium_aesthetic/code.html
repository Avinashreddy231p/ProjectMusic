<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        try {
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        "colors": {
                            "primary": "#ff5a00", // Obsidian Ember Accent
                            "on-primary": "#ffffff",
                            "background": "#000000",
                            "surface": "#000000",
                            "surface-container": "#121212",
                            "on-surface": "#e3e2e2",
                            "on-surface-variant": "#bccbb9",
                            "secondary": "#c8c6c5",
                            "outline-variant": "#3d4a3d",
                        },
                        "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "1rem",
                            "full": "9999px"
                        },
                        "spacing": {
                            "stack-sm": "8px",
                            "stack-md": "16px",
                            "stack-lg": "24px",
                            "container-padding-mobile": "16px",
                            "unit": "8px"
                        },
                        "fontFamily": {
                            "display-lg-mobile": ["Inter"],
                            "headline-sm": ["Inter"],
                            "headline-md": ["Inter"],
                            "body-lg": ["Inter"],
                            "label-md": ["Inter"],
                            "label-sm": ["Inter"]
                        },
                        "fontSize": {
                            "display-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "800" }],
                            "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                            "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                            "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                            "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                            "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }]
                        }
                    },
                },
            }
        } catch (_e) {}
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background text-on-surface flex flex-col min-h-screen selection:bg-primary/30">
<!-- TopAppBar matching SCREEN_54 style -->
<header class="bg-background/80 backdrop-blur-lg sticky top-0 z-50 flex items-center justify-between px-container-padding-mobile h-16 w-full border-b border-white/5">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/5 transition-colors active:scale-90">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-display-lg-mobile text-display-lg-mobile tracking-tight">Settings</h1>
</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-on-surface">search</span>
</button>
</div>
</header>
<main class="flex-1 px-container-padding-mobile pb-44 space-y-8 mt-6">
<!-- Playback Section -->
<section class="space-y-4">
<h3 class="font-label-md text-on-surface-variant uppercase tracking-widest px-1">Playback</h3>
<div class="glass-card rounded-2xl overflow-hidden">
<!-- Gapless Playback -->
<div class="p-5 flex justify-between items-center border-b border-white/5">
<div>
<p class="font-body-lg text-white">Gapless Playback</p>
<p class="text-label-sm text-on-surface-variant mt-0.5">Eliminate silence between tracks</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-white/10 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Automix -->
<div class="p-5 flex justify-between items-center border-b border-white/5">
<div>
<p class="font-body-lg text-white">Automix</p>
<p class="text-label-sm text-on-surface-variant mt-0.5">Smooth transitions between songs</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-white/10 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Equalizer -->
<button class="w-full p-5 flex justify-between items-center hover:bg-white/5 transition-colors group active:scale-[0.99]">
<span class="font-body-lg text-white">Equalizer</span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">chevron_right</span>
</button>
</div>
</section>
<!-- Audio Quality Section -->
<section class="space-y-4">
<h3 class="font-label-md text-on-surface-variant uppercase tracking-widest px-1">Audio Quality</h3>
<div class="glass-card rounded-2xl overflow-hidden">
<div class="p-5 flex justify-between items-center border-b border-white/5 group active:bg-white/5">
<span class="font-body-lg text-white">Streaming Quality</span>
<div class="flex items-center gap-1">
<span class="text-primary font-bold text-label-md">Very High</span>
<span class="material-symbols-outlined text-primary text-lg">expand_more</span>
</div>
</div>
<div class="p-5 flex justify-between items-center group active:bg-white/5">
<span class="font-body-lg text-white">Download Quality</span>
<div class="flex items-center gap-1">
<span class="text-primary font-bold text-label-md">High</span>
<span class="material-symbols-outlined text-primary text-lg">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Storage Section -->
<section class="space-y-4">
<div class="flex justify-between items-end px-1">
<h3 class="font-label-md text-on-surface-variant uppercase tracking-widest">Storage</h3>
<span class="text-label-sm text-on-surface-variant">12.4 GB of 256 GB used</span>
</div>
<div class="glass-card p-6 rounded-2xl space-y-6">
<!-- Visual Storage Bar -->
<div class="h-2.5 w-full bg-white/10 rounded-full flex overflow-hidden">
<div class="h-full bg-primary" style="width: 35%"></div>
<div class="h-full bg-primary/40" style="width: 15%"></div>
<div class="h-full bg-white/5" style="width: 50%"></div>
</div>
<!-- Legend -->
<div class="flex justify-between px-2">
<div class="flex items-center gap-2">
<div class="w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_8px_rgba(255,90,0,0.4)]"></div>
<span class="text-label-sm text-on-surface font-medium">Music</span>
</div>
<div class="flex items-center gap-2">
<div class="w-2.5 h-2.5 rounded-full bg-primary/40"></div>
<span class="text-label-sm text-on-surface font-medium">Cache</span>
</div>
<div class="flex items-center gap-2">
<div class="w-2.5 h-2.5 rounded-full bg-white/10"></div>
<span class="text-label-sm text-on-surface font-medium">Free</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-3 bg-white/5 border border-white/10 rounded-xl font-label-md font-bold text-on-surface hover:bg-white/10 transition-all active:scale-95">
                Clear Cache
            </button>
</div>
</section>
</main>
<!-- Persistent BottomNavBar from SCREEN_54 -->
<nav class="bg-black/90 backdrop-blur-2xl fixed bottom-0 w-full z-50 pb-safe border-t border-white/5 flex justify-around items-center h-20 px-8">
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-secondary text-2xl group-hover:text-on-surface transition-colors group-active:scale-90">home</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-secondary text-2xl group-hover:text-on-surface transition-colors group-active:scale-90">search</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-secondary text-2xl group-hover:text-on-surface transition-colors group-active:scale-90">library_music</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-primary text-2xl group-active:scale-90 transition-transform" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="w-1 h-1 bg-primary rounded-full mt-1"></span>
</button>
</nav>
<script>
    // Micro-interactions
    document.querySelectorAll('button, .glass-card > div').forEach(el => {
        el.addEventListener('touchstart', () => {
            el.style.transform = 'scale(0.98)';
            el.style.transition = 'transform 0.15s cubic-bezier(0.4, 0, 0.2, 1)';
        });
        el.addEventListener('touchend', () => {
            el.style.transform = 'scale(1)';
        });
    });
</script>
</body></html>
