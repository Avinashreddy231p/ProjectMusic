<!DOCTYPE html><html lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Music Player - Now Playing</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'player-bg': '#5b1f07',
            'player-accent': '#ff5a00',
            'player-text-main': '#ffffff',
            'player-text-sub': '#b07f6b',
            'lyrics-bg': '#e54d10',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-gradients">
    /* Matches the specific rust/brownish-orange gradient of the reference */
    body {
      background: linear-gradient(to bottom, #75290b 0%, #5b1f07 40%, #3e1505 100%);
      min-height: 100vh;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    /* Custom track for the range slider to match the thin look */
    input[type=range]::-webkit-slider-runnable-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 12px;
      width: 12px;
      border-radius: 50%;
      background: #ff5a00;
      margin-top: -4px; /* Centers thumb on track */
    }
  </style>
</head>
<body class="flex flex-col p-6" style="background: linear-gradient(to bottom, #ea580c 0%, #000000 100%); min-height: 100vh; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
<!-- BEGIN: Top Navigation Bar -->
<header class="flex justify-between items-center mt-2 mb-8" data-purpose="top-navigation">
<!-- Minimize Button -->
<div class="opacity-80">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><polyline points="6 9 12 15 18 9"></polyline></svg>
</div>
<!-- Title Area -->
<div class="text-center">
<p class="text-[10px] uppercase tracking-widest opacity-60 font-medium">Playing from Album</p>
<h1 class="text-sm font-semibold opacity-90 truncate max-w-[200px]">Rangasthalam (Original M...</h1>
</div>
<!-- Context Menu -->
<div class="opacity-80">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
</div>
</header>
<!-- END: Top Navigation Bar -->
<!-- BEGIN: Album Artwork Section -->
<main class="flex-grow flex flex-col justify-center items-center" data-purpose="content-area">
<div class="w-full aspect-square px-4 mb-8">
<!-- Image URL provided in prompt used here -->
<img alt="Rangasthalam Album Art" class="w-full object-cover shadow-2xl aspect-square rounded-2xl" data-purpose="album-art" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAeduyvcYWmHxZes147J2vca1Fok4WEuNfpv1ZSuwQVIsZJ4hq7d_KfUUBFuTm_ZIOE8gkwLscqGgwX7V_pxuMJnCG6JnZsTfgOLw_v6ZOuZjD7sxC3JOcjywUHpqsg-PSzzIgu0hFgvHzPr1qwYy10dYyfFULt463nYvz7ZI4aU5VPWU5vlJTzFKxjH9dNeuJlCgPZd1kzBBUltogJqwtXcL8xMvg9LvPLZ4hlrWC6zOjmU4ldaT-eZ5m3E7uXIZrH3Q">
</div>
<!-- END: Album Artwork Section -->
<!-- BEGIN: Metadata and Quick Actions -->
<div class="w-full px-2 flex justify-between items-end mb-6" data-purpose="song-metadata">
<div class="overflow-hidden">
<h2 class="text-2xl font-bold tracking-tight truncate">Ranga Ranga Ranga...</h2>
<p class="text-player-text-sub text-lg font-medium truncate">Rahul Sipligunj • Rangasthala...</p>
</div>
<div class="flex gap-5 mb-2">
<button class="opacity-90">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
</button>
<button class="opacity-90">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line x1="8" x2="21" y1="6" y2="6"></line><line x1="8" x2="21" y1="12" y2="12"></line><line x1="8" x2="21" y1="18" y2="18"></line><line x1="3" x2="3.01" y1="6" y2="6"></line><line x1="3" x2="3.01" y1="12" y2="12"></line><line x1="3" x2="3.01" y1="18" y2="18"></line></svg>
</button>
</div>
</div>
<!-- END: Metadata and Quick Actions -->
<!-- BEGIN: Playback Progress Slider -->
<div class="w-full px-2 mb-6" data-purpose="progress-control"><div class="relative w-full h-1 bg-white/20 rounded-full mb-4">
  <div class="absolute left-0 top-0 h-full bg-player-accent rounded-full" style="width: 2%;"></div>
  <div class="absolute top-1/2 -translate-y-1/2 w-3 h-3 bg-player-accent rounded-full shadow-lg" style="left: 2%;"></div>
</div>
<div class="flex justify-between text-xs text-white/60 font-medium px-0.5">
  <span class="">0:02</span>
  <span class="">5:05</span>
</div></div>
<!-- END: Playback Progress Slider -->
<!-- BEGIN: Playback Controls -->
<div class="w-full px-4 flex justify-between items-center mb-8" data-purpose="playback-buttons">
<!-- Shuffle -->
<button class="opacity-60">
<svg fill="none" height="22" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="22" xmlns="http://www.w3.org/2000/svg"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" x2="21" y1="20" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" x2="21" y1="15" y2="21"></line><line x1="4" x2="9" y1="4" y2="9"></line></svg>
</button>
<!-- Previous -->
<button>
<svg fill="currentColor" height="32" viewBox="0 0 24 24" width="32" xmlns="http://www.w3.org/2000/svg"><polygon points="19 20 9 12 19 4 19 20"></polygon><line stroke="currentColor" stroke-width="2" x1="5" x2="5" y1="19" y2="5"></line></svg>
</button>
<!-- Play/Pause (Large Orange Circle) -->
<button class="w-20 h-20 bg-player-accent rounded-full flex items-center justify-center shadow-lg transform active:scale-95 transition-transform" style="background-color: rgb(255, 90, 0);">
<svg fill="white" height="40" viewBox="0 0 24 24" width="40" xmlns="http://www.w3.org/2000/svg" class=""><path d="M7 4.405c0-1.54 1.67-2.502 3.003-1.73l10.037 5.805c1.333.772 1.333 2.69 0 3.462L10.003 17.747C8.67 18.519 7 17.556 7 16.017V4.405z" stroke="white" stroke-width="1" stroke-linejoin="round"></path></svg>
</button>
<!-- Next -->
<button>
<svg fill="currentColor" height="32" viewBox="0 0 24 24" width="32" xmlns="http://www.w3.org/2000/svg"><polygon points="5 4 15 12 5 20 5 4"></polygon><line stroke="currentColor" stroke-width="2" x1="19" x2="19" y1="5" y2="19"></line></svg>
</button>
<!-- Repeat -->
<button class="opacity-60">
<svg fill="none" height="22" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="22" xmlns="http://www.w3.org/2000/svg"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
</button>
</div>
<!-- END: Playback Controls -->
<!-- BEGIN: Bottom Function Bar -->
<div class="w-full flex justify-between items-center px-2 mb-4" data-purpose="utility-bar">
<!-- Volume Toggle -->
<button class="opacity-80">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
</button>
<div class="flex gap-8"><!-- Share -->
<button class="opacity-80">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"></line><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"></line></svg>
</button>
<!-- Queue -->
<button class="opacity-80 flex items-center justify-center">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><line x1="8" x2="21" y1="6" y2="6"></line><line x1="8" x2="21" y1="12" y2="12"></line><line x1="8" x2="21" y1="18" y2="18"></line><line x1="3" x2="3.01" y1="6" y2="6"></line><line x1="3" x2="3.01" y1="12" y2="12"></line><line x1="3" x2="3.01" y1="18" y2="18"></line></svg>
</button></div>
</div>
<!-- END: Bottom Function Bar -->
<section class="w-full p-6" data-purpose="lyrics-card-moved">
<div class="bg-lyrics-bg rounded-2xl p-6 flex flex-col shadow-[0_-10px_50px_rgba(0,0,0,0.4)]">
<div class="flex justify-between items-start mb-8">
<h3 class="text-white text-lg font-bold">Lyrics</h3>
<div class="bg-white/20 p-1.5 rounded-full">
<svg fill="none" height="18" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewBox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" x2="14" y1="3" y2="10"></line><line x1="3" x2="10" y1="21" y2="14"></line></svg>
</div>
</div>
<div class="flex flex-col items-center justify-center text-center gap-5 py-4">
<p class="text-white/60 text-2xl font-bold">ఓహో</p>
<p class="text-white text-2xl font-bold leading-tight">(వినపడేట్టు కదుర<br>కనబడేట్టు కొట్టండేహో)</p>
<p class="text-white/60 text-2xl font-bold mt-2">హే రంగా రంగా</p>
</div>
</div>
</section></main>
<!-- BEGIN: Lyrics Drawer -->
<!-- END: Lyrics Drawer -->


</body></html>
