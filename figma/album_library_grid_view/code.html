<script>
        // Subtle scroll behavior for the TopAppBar
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('bg-opacity-90', 'backdrop-blur-md');
                header.classList.remove('bg-background');
            } else {
                header.classList.add('bg-background');
                header.classList.remove('bg-opacity-90', 'backdrop-blur-md');
            }
        });

        // Pill active state toggle
        const pills = document.querySelectorAll('.px-4.py-2.rounded-full');
        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => {
                    p.classList.remove('active-pill');
                    p.classList.add('bg-surface-container-high', 'text-on-surface-variant');
                });
                pill.classList.add('active-pill');
                pill.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
            });
        });
    </script>
