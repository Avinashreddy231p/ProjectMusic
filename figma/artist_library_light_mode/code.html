<script>
    // Micro-interaction for filter chips
    const chips = document.querySelectorAll('section button');
    chips.forEach(chip => {
        chip.addEventListener('click', () => {
            if(chip.parentElement.classList.contains('overflow-x-auto')){
                const siblings = chip.parentElement.querySelectorAll('button');
                siblings.forEach(s => {
                    s.classList.remove('bg-primary', 'text-on-primary', 'font-bold', 'shadow-sm', 'shadow-primary/20', 'border-primary', 'bg-primary/5');
                    s.classList.add('bg-white', 'text-on-surface', 'border', 'border-outline-variant');
                });
                if (chip.classList.contains('px-4') && chip.classList.contains('py-2')) {
                    chip.classList.add('bg-primary', 'text-on-primary', 'font-bold', 'shadow-sm', 'shadow-primary/20');
                    chip.classList.remove('bg-white', 'text-on-surface', 'border', 'border-outline-variant');
                } else {
                    chip.classList.add('border-primary', 'text-primary', 'bg-primary/5');
                    chip.classList.remove('bg-white', 'text-on-surface', 'border-outline-variant');
                }
            }
        });
    });
</script>
