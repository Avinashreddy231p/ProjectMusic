name: Build Release APK

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        variant: [ github, fdroid, playstore ]

    steps:
      - uses: actions/checkout@v6

      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android-SDK
        uses: android-actions/setup-android@v4

      - name: Create files for signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PROPERTIES: ${{ secrets.SIGNING_PROPERTIES }}
        run: |
          echo $SIGNING_KEY | base64 -di > ./projectmusic_keystore.jks
          echo $SIGNING_PROPERTIES | base64 -di > ./keystore.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build app
        env:
          VARIANT: ${{ matrix.variant }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
        run: |
          CAP_VARIANT="$(echo ${VARIANT:0:1} | tr '[:lower:]' '[:upper:]')${VARIANT:1}"
          if [ "$VARIANT" == "playstore" ]; then
            ./gradlew bundle${CAP_VARIANT}Release
          else
            ./gradlew assemble${CAP_VARIANT}Release
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.variant }}-release
          path: |
            app/build/outputs/apk/*/release/ProjectMusic-*.apk
            app/build/outputs/bundle/*/*.aab

  publish-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: artifacts-*-release
          merge-multiple: true

      - name: Set Release Metadata
        id: metadata
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            NAME="Release $TAG"
            PRERELEASE="false"
            # Detect prerelease from tag name
            if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
              PRERELEASE="true"
            fi
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "name=$NAME" >> $GITHUB_OUTPUT
            echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
          else
            echo "tag=latest-ci" >> $GITHUB_OUTPUT
            echo "name=Continuous Build" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
          fi

      - name: Github Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.name }}
          prerelease: ${{ steps.metadata.outputs.prerelease }}
          make_latest: ${{ steps.metadata.outputs.make_latest }}
          generate_release_notes: true
          files: |
            release-artifacts/**/ProjectMusic-*.apk
            release-artifacts/**/ProjectMusic-*.aab
