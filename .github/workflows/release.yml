name: Master Build & Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/**"
      - ".idea/"
      - "assets/"
      - "metadata/"
      - '.gitignore'
      - "*.md"
      - "LICENSE.txt"
  pull_request:
    branches: [ master ]
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/**"
      - ".idea/"
      - "assets/"
      - "metadata/"
      - '.gitignore'
      - "*.md"
      - "LICENSE.txt"

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Lint
        run: ./gradlew lint

  build:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [ github, fdroid, playstore ]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android-SDK
        uses: android-actions/setup-android@v4

      - name: Create files for signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PROPERTIES: ${{ secrets.SIGNING_PROPERTIES }}
        run: |
          echo $SIGNING_KEY | base64 -di > ./projectmusic_keystore.jks
          echo $SIGNING_PROPERTIES | base64 -di > ./keystore.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Create Last.fm config
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
        run: |
          echo "LASTFM_API_KEY=${LASTFM_API_KEY}" >> local.properties
          echo "LASTFM_SECRET=${LASTFM_SECRET}" >> local.properties

      - name: Build app
        env:
          VARIANT: ${{ matrix.variant }}
          RELEASE_TYPE: "CI"
        run: |
          CAP_VARIANT="$(echo ${VARIANT:0:1} | tr '[:lower:]' '[:upper:]')${VARIANT:1}"
          if [ "$VARIANT" == "playstore" ]; then
            ./gradlew bundle${CAP_VARIANT}Release
          else
            ./gradlew assemble${CAP_VARIANT}Release
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.variant }}-release
          path: |
            app/build/outputs/apk/*/release/ProjectMusic-*.apk
            app/build/outputs/bundle/*/*.aab

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: artifacts-*-release
          merge-multiple: true

      - name: Create Changelog
        id: changelog
        uses: actions/github-script@v9
        env:
          COMMITS: ${{ toJSON(github.event.commits) }}
        with:
          result-encoding: string
          script: |
            const commits = JSON.parse(process.env.COMMITS || "[]");
            if (commits.length === 0) return "Regular build update.";
            return commits
              .map(commit => `- ${commit.message.split("\n")[0]}`)
              .join("\n");

      - name: Set Release Metadata
        id: metadata
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            NAME="Release $TAG"
            PRERELEASE="false"
            if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
              PRERELEASE="true"
            fi
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "name=$NAME" >> $GITHUB_OUTPUT
            echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
          else
            echo "tag=latest-ci" >> $GITHUB_OUTPUT
            echo "name=Continuous Build" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
          fi

      - name: Github Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.name }}
          prerelease: ${{ steps.metadata.outputs.prerelease }}
          make_latest: ${{ steps.metadata.outputs.make_latest }}
          body: |
            ## Changelog
            ${{ steps.changelog.outputs.result }}
          files: |
            release-artifacts/**/ProjectMusic-*.apk
            release-artifacts/**/ProjectMusic-*.aab

      - name: Find Telegram APK
        run: |
          APK_PATH=$(find release-artifacts -name '*github-universal.apk' | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find release-artifacts -name 'ProjectMusic-*-github-*.apk' | head -n 1)
          fi
          echo "APK_FILE=$APK_PATH" >> $GITHUB_ENV

      - name: Send to Telegram
        if: env.APK_FILE != ''
        run: |
          pip install telethon
          python <<EOF
          import os
          import asyncio
          from telethon import TelegramClient

          async def send_file():
              api_id = int(os.environ['API_ID'])
              api_hash = os.environ['API_HASH']
              bot_token = os.environ['BOT_TOKEN']
              chat_id = int(os.environ['TG_CHAT_ID'])
              file_path = os.environ['APK_FILE']
              message = os.environ['TG_MESSAGE']
              
              client = TelegramClient('bot', api_id, api_hash)
              await client.start(bot_token=bot_token)
              
              # thread_id 3 based on user link: https://t.me/c/4326107882/3
              await client.send_file(chat_id, file_path, caption=message, reply_to=3)
              await client.disconnect()

          if __name__ == '__main__':
              loop = asyncio.get_event_loop()
              loop.run_until_complete(send_file())
          EOF
        env:
          API_ID: ${{ secrets.TG_API_ID }}
          API_HASH: ${{ secrets.TG_API_HASH }}
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_MESSAGE: |
            🚀 **New Build: ${{ steps.metadata.outputs.name }}**
            
            📋 **Changelog:**
            ${{ steps.changelog.outputs.result }}
